<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>怠惰のガガガ - POP ART EDITION</title>
    <link href="./style.css" rel="stylesheet">
  </head>
  <body class="antialiased selection:bg-pop-pink selection:text-white bg-[#f8f9fa] text-[#111111]">

    <!-- Playful Parallax Pop Background -->
    <div id="ga-bg-container" class="fixed inset-0 pointer-events-none overflow-hidden z-0 opacity-40"></div>

    <!-- 1. Hero Section (ファーストビュー) -->
    <section id="hero" class="relative w-full h-screen overflow-hidden flex flex-col items-center justify-center z-10 border-b-[8px] border-black bg-white">
      
      <!-- Pattern background (subtle dots) -->
      <div class="absolute inset-0 opacity-[0.03] z-0" style="background-image: radial-gradient(black 2px, transparent 2px); background-size: 20px 20px; background-position: 0 0;"></div>

      <!-- Copy text -->
      <div id="hero-copy" class="absolute top-[18%] w-full text-center z-30 px-4">
         <p class="font-display text-lg md:text-5xl font-black tracking-widest text-[#111] bg-white border-4 border-black inline-block px-4 md:px-6 py-2 md:py-3 pop-shadow-pink gagaga-text hover:animate-shake cursor-pointer backdrop-blur-sm" data-text="ただ聴くだけの退屈な時間は、ここで終わる。">
           ただ聴くだけの退屈な時間は、ここで終わる。
         </p>
      </div>

      <!-- Center Logo -->
      <div class="relative z-20 p-4 mt-10 md:mt-20 w-[90%] md:max-w-4xl flex justify-center group cursor-pointer transition-transform duration-300 transform" id="logo-container">
        <!-- Main Graphic Logo - Pop Art Style -->
        <img src="/logo-horizontal.png" alt="怠惰のガガガ" class="w-full h-auto drop-shadow-2xl transition-all duration-300 group-hover:scale-105 group-hover:animate-shake" />
      </div>

      <!-- Mascot Image -->
      <div id="hero-mascot" class="absolute bottom-10 right-4 md:bottom-20 md:right-32 z-20 w-32 md:w-64 xl:w-96 transition-all duration-1000 ease-out origin-bottom transform mascot-float hover:scale-110 cursor-pointer drop-shadow-xl">
        <img src="/mascot.webp" alt="ミニキャラ" class="w-full h-auto" id="hero-mascot-img" />
      </div>

      <!-- Scroll indicator -->
      <div class="absolute bottom-5 left-1/2 -translate-x-1/2 flex flex-col items-center animate-bounce text-black font-bold">
        <span class="text-xs tracking-widest mb-2 font-display">SCROLL</span>
        <div class="w-[4px] h-16 bg-pop-pink border-2 border-black"></div>
      </div>

      <!-- Playful Decals -->
      <div class="mask-ga decal-pop w-16 md:w-24 h-16 md:h-24 top-1/4 left-4 md:left-10 rotate-12 text-pop-blue opacity-80" style="background-color: currentColor;"></div>
      <div class="mask-ga decal-pop w-20 md:w-32 h-20 md:h-32 bottom-20 left-[10%] md:left-[20%] -rotate-6 text-pop-orange opacity-70" style="background-color: currentColor;"></div>
    </section>

    <!-- Ga Lining 1 -->
    <div class="ga-lining-wrapper bg-black py-2 overflow-hidden border-b-4 border-black">
      <div id="ga-lining-1" class="ga-lining-container"></div>
    </div>

    <!-- 2 & 3. Members Section (OTO MART Matrix Grid) -->
    <section id="members" class="relative w-full py-32 z-20 border-b-[8px] border-black bg-[#f4f6f8]">

      <div class="container mx-auto px-4 max-w-7xl relative z-10">
        <div class="text-center mb-10 md:mb-16">
          <h2 class="font-display text-4xl md:text-7xl font-black text-white bg-black pop-shadow-blue inline-block px-6 md:px-8 py-2 transform -rotate-2 hover:rotate-2 transition-transform cursor-pointer gagaga-text border-4 border-black" data-text="MEMBERS">
            MEMBERS
          </h2>
        </div>
        
        <!-- Playful decals in members section -->
        <div class="mask-ga decal-pop hidden md:block w-40 h-40 -top-10 -right-10 rotate-45 text-pop-pink opacity-20" style="background-color: currentColor;"></div>
        <div class="mask-ga decal-pop hidden md:block w-20 h-20 bottom-0 left-1/4 -rotate-12 text-pop-green opacity-40" style="background-color: currentColor;"></div>

        <!-- Rendered dynamically via main.js -->
        <div id="members-grid" class="flex flex-col items-center md:grid md:grid-cols-4 lg:grid-cols-5 gap-8 md:gap-6 relative z-20 w-full">
        </div>

        <!-- HOW_TO_LISTEN Section (Drastic Improvement) -->
        <div id="how-to-listen" class="mt-20 md:mt-32 py-10 flex flex-col items-center w-full relative z-30">
           <div class="reveal-init w-[95%] max-w-4xl shadow-2xl neon-border-cyan p-8 md:p-16 flex flex-col items-center text-center rounded-[2rem]">
              
              <!-- Yama Branding (Centered Header) -->
              <div class="flex flex-col items-center gap-6 mb-12">
                 <div class="relative group">
                   <img src="/ヤマアイコン.webp" alt="〽️ヤマ" class="w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-[#00ffff] object-cover shadow-[0_0_20px_rgba(0,255,255,0.5)] transition-transform duration-300 group-hover:scale-110" />
                   <div class="absolute -inset-2 border-2 border-[#00ffff] rounded-full animate-ping opacity-20 pointer-events-none"></div>
                 </div>
                 <h3 class="text-3xl md:text-5xl font-black text-[#00ffff] gagaga-text tracking-widest" data-text="〽️ヤマ">〽️ヤマ</h3>
              </div>

              <h2 class="font-display text-4xl md:text-6xl font-black mb-12 gagaga-text text-pop-blue" data-text="LIVEを聴く方法">LIVEを聴く方法</h2>
              
              <ol class="w-full space-y-8 mb-16 text-xl md:text-2xl font-bold leading-loose flex flex-col items-center">
                 <li class="flex flex-col md:flex-row items-center gap-6 my-4 w-full justify-center">
                    <div class="step-badge">1</div>
                    <span class="md:pt-1">音楽配信アプリ【AWA】をダウンロード</span>
                 </li>
                 <li class="flex flex-col md:flex-row items-center gap-6 my-4 w-full justify-center">
                    <div class="step-badge">2</div>
                    <span class="md:pt-1">AWA公認配信者【〽️ヤマ】をフォロー</span>
                 </li>
              </ol>

              <!-- CTA Button (High Contrast) -->
              <a href="https://s.awa.fm/user/tcibd6vcaba5hnzy5xryyyy7ry?t=1776856537" target="_blank" rel="noopener noreferrer" class="group relative flex items-center justify-center w-full max-w-2xl h-24 bg-pop-pink text-black font-display text-xl md:text-3xl font-black border-4 border-black pop-shadow-black hover:translate-x-2 hover:translate-y-2 transition-all overflow-hidden rounded-2xl">
                 <span class="relative z-10 group-hover:hidden tracking-wider">〽️ヤマをフォローしてライブを聴く</span>
                 <span class="hidden group-hover:block relative z-20 text-black animate-shake text-4xl md:text-5xl" style="font-family: inherit;">AWAで聴く！</span>
              </a>
           </div>
        </div>
      </div>
    </section>

    <!-- Ga Lining 2 -->
    <div class="ga-lining-wrapper bg-black py-2 overflow-hidden border-b-4 border-black">
      <div id="ga-lining-2" class="ga-lining-container"></div>
    </div>

    <!-- 4. Step-up Offer (Mascot Floating upwards) -->
    <section id="stepup" class="relative w-full py-32 border-b-[8px] border-black bg-[#eef1f5]">
      <div class="container mx-auto px-6 max-w-4xl relative z-10 flex flex-col items-center">
        <h2 class="font-display text-4xl md:text-5xl font-black text-black mb-16 text-center bg-pop-orange border-4 border-black px-6 py-2 pop-shadow-black transform rotate-1 gagaga-text" data-text="オープンチャット参加特典">
           オープンチャット参加特典
        </h2>
        
        <!-- The visual representations for the steps -->
        <div class="relative w-full max-w-md h-[500px] flex items-center justify-center bg-white border-4 border-black pop-shadow-black p-8">
           <!-- The Progress Bar (Vertical) -->
           <div class="w-12 h-full bg-gray-200 border-4 border-black rounded-full overflow-hidden relative flex flex-col justify-end">
              <!-- Fill -->
              <div id="progress-fill" class="w-full bg-pop-pink transition-all duration-[3000ms] ease-out border-t-4 border-black" style="height: 0%;"></div>
           </div>

           <!-- Scale Marks -->
           <div class="flex flex-col justify-between h-full py-4 ml-8 font-display text-2xl font-black text-black pointer-events-none">
              <div class="flex items-center"><span class="w-6 h-2 bg-black mr-2"></span>300人</div>
              <div class="flex items-center"><span class="w-6 h-2 bg-black mr-2"></span>200人</div>
              <div class="flex items-center"><span class="w-6 h-2 bg-black mr-2"></span>100人</div>
              <div class="flex items-center"><span class="w-6 h-2 bg-black mr-2"></span>50人</div>
           </div>

           <!-- Mascot image that will float alongside the progress bar -->
           <div id="progress-mascot" class="absolute left-[-50px] bottom-[10%] w-40 md:w-56 transition-all duration-[3000ms] ease-out z-20 drop-shadow-xl">
             <img src="/mascot.webp" alt="floating mascot" class="w-full h-auto mascot-float" />
           </div>
        </div>
      </div>
    </section>

    <!-- 5. CTA Section (最後の一押し) -->
    <section id="cta" class="relative w-full py-40 flex items-center justify-center overflow-hidden bg-white z-20">
      
      <!-- Pop art dots -->
      <div class="absolute inset-0 z-0 opacity-[0.05]" style="background-image: radial-gradient(#111 4px, transparent 4px); background-size: 30px 30px; background-position: 0 0;"></div>

      <div class="relative z-10 flex flex-col md:flex-row items-center justify-center gap-10 w-full max-w-5xl px-8">
        
        <!-- Hovering Mascot gazing -->
        <div class="w-56 h-56 mascot-float flex-shrink-0 z-20 -rotate-12 hover:rotate-12 transition-transform drop-shadow-2xl">
          <img src="/mascot.webp" alt="見つめるマスコット" class="w-full h-auto object-contain" />
        </div>

        <!-- Pop CTA Button -->
        <a href="#" id="cta-button" class="group relative flex items-center justify-center w-full md:max-w-[450px] h-20 md:h-[120px] bg-black text-white font-display text-2xl md:text-4xl font-black border-4 border-black pop-shadow-pink transition-all duration-75 hover:translate-x-1 hover:translate-y-1 hover:box-shadow-none hover:bg-pop-pink overflow-hidden rounded-lg">
          
          <span class="relative z-10 group-hover:hidden tracking-wider">怠惰組に参加する</span>
          
          <!-- Intense Glitch Text on Hover -->
          <span class="hidden group-hover:block relative z-20 font-black text-3xl md:text-5xl gagaga-text text-pop-orange animate-shake" data-text="ガガガガガガ！">
            ガガガガガガ！
          </span>
          
        </a>

      </div>
    </section>

    <footer class="w-full py-10 text-center bg-[#111] text-white relative z-30 font-body border-t-[8px] border-pop-orange">
      <p class="font-black tracking-widest text-lg">© 2026 怠惰のガガガ.</p>
    </footer>

    <script type="module" src="/main.js"></script>
    <style>
      .text-stroke-2 { -webkit-text-stroke-width: 2px; }
      .text-stroke-black { -webkit-text-stroke-color: black; }
    </style>
  </body>
</html>
